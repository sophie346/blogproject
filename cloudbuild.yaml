# CI/CD for multi-tenant blog → GKE deployment `commonblog`.
# Trigger on branch cicd-prod (Cloud Build trigger → this config).
#
# Local:
#   gcloud builds submit --config=cloudbuild.yaml --project=gentle-epoch-277301
#
# Image: gcr.io/gentle-epoch-277301/commonblog:latest
# Cluster: oneautobackend (us-east1-b), namespace default

substitutions:
  _GKE_CLUSTER: oneautobackend
  _GKE_LOCATION: us-east1-b
  _K8S_NAMESPACE: default
  _DEPLOYMENT: commonblog
  _IMAGE_NAME: commonblog

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="gcr.io/${PROJECT_ID}/${_IMAGE_NAME}"
        docker pull "$$IMAGE" || true
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from "$$IMAGE" \
          -t "$$IMAGE" \
          -f Dockerfile \
          .
        docker push "$$IMAGE"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials "${_GKE_CLUSTER}" \
          --location="${_GKE_LOCATION}" \
          --project="${PROJECT_ID}"
        kubectl rollout restart deployment "${_DEPLOYMENT}" -n "${_K8S_NAMESPACE}"
        kubectl rollout status "deployment/${_DEPLOYMENT}" -n "${_K8S_NAMESPACE}" --timeout=300s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

timeout: 3600s
